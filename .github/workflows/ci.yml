name: Node.js CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Gitleaks scan
        run: echo "Running gitleaks"
      - name: Semgrep scan
        run: echo "Running semgrep"
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Dependency audit
        run: echo "Running dependency audit"
      - name: Trivy image scan
        run: echo "Running trivy"
