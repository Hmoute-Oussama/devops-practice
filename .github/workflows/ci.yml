name: Node.js CI Pipeline v1
on:
  pull_request: null
  push:
    branches:
      - main
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Secret Scanning Recommendation
        uses: actions/github-script@v7
        with: &a1
          script: console.log('Enable GitHub Secret Scanning or use Gitleaks/TruffleHog for secret detection')
      - name: Initialize CodeQL (Auto-Detect Languages)
        uses: github/codeql-action/init@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
      - name: Dependency Scan with Trivy FS
        uses: aquasecurity/trivy-action@master
        with: &a2
          scan-type: fs
          format: sarif
          output: trivy-fs-results.sarif
      - name: Upload Trivy FS Results
        uses: github/codeql-action/upload-sarif@v3
        with: &a3
          sarif_file: trivy-fs-results.sarif
      - name: Run Security Unit Tests
        uses: actions/github-script@v7
        with: &a4
          script: console.log('Ensure security unit tests are executed (npm test, pytest, mvn test, etc.)')
      - name: Reproducible Build Recommendation
        uses: actions/github-script@v7
        with: &a5
          script: console.log('Use npm ci instead of npm install for reproducible npm builds; use similar tools for other ecosystems')
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with: &a6
          format: cyclonedx-json
      - name: License Policy Check
        uses: actions/github-script@v7
        with: &a7
          script: console.log('Configure license checking tool like FOSSA or Snyk for your dependencies')
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Attest Build Provenance (SLSA)
        uses: actions/attest-build-provenance@v1
        with: &a8
          subject-path: dist/**
      - name: Generate Artifact Checksums
        run: sha256sum dist/** > checksums.txt
      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with: &a9
          name: checksums
          path: checksums.txt
      - name: IaC Scan with Checkov
        uses: bridgecrewio/checkov-action@master
        with: &a10
          directory: .
          quiet: true
      - name: Container Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with: &a11
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: sarif
          output: trivy-container-results.sarif
      - name: Upload Trivy Container Results
        uses: github/codeql-action/upload-sarif@v3
        with: &a12
          sarif_file: trivy-container-results.sarif
      - name: DAST Scan with OWASP ZAP
        uses: zaproxy/action-full-scan@v0.9.0
        with: &a13
          target: http://localhost:3000
      - name: Malware Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with: &a14
          scan-type: fs
          scan-ref: .
          security-checks: vuln,secret,config,license
      - name: Dockerfile Best Practices Check with Checkov
        uses: bridgecrewio/checkov-action@master
        with: &a15
          directory: .
          quiet: true
      - name: Run Security Integration Tests
        uses: actions/github-script@v7
        with: &a16
          script: console.log('Ensure security integration tests are executed (integration-test, mvn verify, docker compose up, etc.)')
      - name: Run Smoke Tests
        uses: actions/github-script@v7
        with: &a17
          script: console.log('Ensure smoke tests are executed (curl localhost, health endpoint checks, etc.)')
      - name: Sign Docker Image
        run: cosign sign --yes ghcr.io/${{ github.repository }}:${{ github.sha }}
        env: &a18
          COSIGN_EXPERIMENTAL: "1"
      - name: Verify Docker Image Signature
        run: cosign verify ghcr.io/${{ github.repository }}:${{ github.sha }} --certificate-identity-regexp='https://github.com/${{ github.repository_owner }}/.github/workflows/.*@refs/heads/main' --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
        env: &a19
          COSIGN_EXPERIMENTAL: "1"
      - name: Check Container Non-Root User
        uses: actions/github-script@v7
        with: &a20
          script: console.log('Ensure Dockerfile defines USER app (or similar non-root user)')
      - name: Immutable Tags Check
        uses: actions/github-script@v7
        with: &a21
          script: console.log('Do not use "latest" tag for Docker images; use specific versions or commit SHA')
      - name: Policy as Code Recommendation
        uses: actions/github-script@v7
        with: &a22
          script: console.log('Consider using Open Policy Agent (OPA) or Conftest for policy enforcement')
      - name: Recommendations for Secure Secret Management
        uses: actions/github-script@v7
        with: &a23
          script: console.log('Ensure secrets are stored and accessed via GitHub Secrets, HashiCorp Vault, AWS Secrets Manager, or similar tools')
      - name: Vulnerability Threshold Check
        uses: actions/github-script@v7
        with: &a24
          script: console.log('Configure vulnerability scanner to fail if critical > 0 or high > 5')
      - name: "Dependency Pinning: Use Lock Files"
        uses: actions/github-script@v7
        with: &a25
          script: "console.log('Please ensure dependency lock files are committed: package-lock.json, poetry.lock, Cargo.lock, go.sum, composer.lock are present and committed')"
      - name: "Automated Patch PR: Use Dependabot/Renovate"
        uses: actions/github-script@v7
        with: &a26
          script: console.log('Please set up Dependabot or Renovate (e.g., create .github/dependabot.yml')
      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v3
        with: &a27
          sarif_file: results.sarif
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with: &a28
          name: sbom
          path: "**/bom.json"
      - name: Upload Production Artifacts
        uses: actions/upload-artifact@v4
        with: &a29
          name: production-artifacts
          path: dist/**
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with: &a30
          name: security-reports
          path: "**/*.sarif,**/bom.json"
      - name: License Policy Check
        uses: actions/github-script@v7
        with: &a31
          script: console.log('Configure license check to fail on forbidden licenses (e.g., GPL)')
      - name: GitHub Actions Pinning Recommendation
        uses: actions/github-script@v7
        with: &a32
          script: console.log('Pin all GitHub Actions to specific SHA hashes instead of tags for improved security')
      - name: Gitleaks scan
        run: echo "Running gitleaks"
      - name: Semgrep scan
        run: echo "Running semgrep"
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Secret Scanning Recommendation
        uses: actions/github-script@v7
        with: *a1
      - name: Initialize CodeQL (Auto-Detect Languages)
        uses: github/codeql-action/init@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
      - name: Dependency Scan with Trivy FS
        uses: aquasecurity/trivy-action@master
        with: *a2
      - name: Upload Trivy FS Results
        uses: github/codeql-action/upload-sarif@v3
        with: *a3
      - name: Run Security Unit Tests
        uses: actions/github-script@v7
        with: *a4
      - name: Reproducible Build Recommendation
        uses: actions/github-script@v7
        with: *a5
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with: *a6
      - name: License Policy Check
        uses: actions/github-script@v7
        with: *a7
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Attest Build Provenance (SLSA)
        uses: actions/attest-build-provenance@v1
        with: *a8
      - name: Generate Artifact Checksums
        run: sha256sum dist/** > checksums.txt
      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with: *a9
      - name: IaC Scan with Checkov
        uses: bridgecrewio/checkov-action@master
        with: *a10
      - name: Container Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with: *a11
      - name: Upload Trivy Container Results
        uses: github/codeql-action/upload-sarif@v3
        with: *a12
      - name: DAST Scan with OWASP ZAP
        uses: zaproxy/action-full-scan@v0.9.0
        with: *a13
      - name: Malware Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with: *a14
      - name: Dockerfile Best Practices Check with Checkov
        uses: bridgecrewio/checkov-action@master
        with: *a15
      - name: Run Security Integration Tests
        uses: actions/github-script@v7
        with: *a16
      - name: Run Smoke Tests
        uses: actions/github-script@v7
        with: *a17
      - name: Sign Docker Image
        run: cosign sign --yes ghcr.io/${{ github.repository }}:${{ github.sha }}
        env: *a18
      - name: Verify Docker Image Signature
        run: cosign verify ghcr.io/${{ github.repository }}:${{ github.sha }} --certificate-identity-regexp='https://github.com/${{ github.repository_owner }}/.github/workflows/.*@refs/heads/main' --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
        env: *a19
      - name: Check Container Non-Root User
        uses: actions/github-script@v7
        with: *a20
      - name: Immutable Tags Check
        uses: actions/github-script@v7
        with: *a21
      - name: Policy as Code Recommendation
        uses: actions/github-script@v7
        with: *a22
      - name: Recommendations for Secure Secret Management
        uses: actions/github-script@v7
        with: *a23
      - name: Vulnerability Threshold Check
        uses: actions/github-script@v7
        with: *a24
      - name: "Dependency Pinning: Use Lock Files"
        uses: actions/github-script@v7
        with: *a25
      - name: "Automated Patch PR: Use Dependabot/Renovate"
        uses: actions/github-script@v7
        with: *a26
      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v3
        with: *a27
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with: *a28
      - name: Upload Production Artifacts
        uses: actions/upload-artifact@v4
        with: *a29
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with: *a30
      - name: License Policy Check
        uses: actions/github-script@v7
        with: *a31
      - name: GitHub Actions Pinning Recommendation
        uses: actions/github-script@v7
        with: *a32
      - name: Dependency audit
        run: echo "Running dependency audit"
      - name: Trivy image scan
        run: echo "Running trivy"
